version: "2"
type: frontend
tech_stack:
  - JavaScript
  - React
  - Vite
  - Tailwind CSS
  - Supabase
  - Framer Motion
  - Boneyard-js
routes:
  - path: /
    file: src/pages/Landing.jsx
    auth_required: false
    description: Main landing page with service overview and doctor onboarding
  - path: /login
    file: src/auth/pages/Login.jsx
    auth_required: false
    description: Unified login page for patients, doctors, and providers
  - path: /register
    file: src/auth/pages/Register.jsx
    auth_required: false
    description: Patient registration page
  - path: /blogs
    file: src/pages/Blogs.jsx
    auth_required: false
    description: Health articles and wellness tips
  - path: /patient/dashboard
    file: src/patient/pages/PatientDashboard.jsx
    auth_required: true
    description: Patient appointment and health record management
  - path: /doctor/dashboard
    file: src/doctor/pages/DoctorDashboard.jsx
    auth_required: true
    description: Doctor consultation and schedule management
  - path: /medical/dashboard
    file: src/medical/pages/MedicalDashboard.jsx
    auth_required: true
    description: Medical store inventory and registration management
  - path: /clinic/dashboard
    file: src/clinic/pages/ClinicDashboard.jsx
    auth_required: true
    description: Clinic branch and doctor performance management
features:
  - name: Doctor Onboarding
    description: Multi-step registration for new healthcare providers including credential verification and document upload
    files:
      - src/components/landing/DoctorOnboardingModal.jsx
      - src/components/landing/Header.jsx
    entry_route: /
    user_interactions:
      - Click "Join as a Doctor" button in header
      - Fill personal info, credentials, and practice details
      - Upload medical license and ID documents
      - Submit application for admin review
    auth_required: false
  - name: Health Blog Search
    description: Searching and filtering medical articles by category and keywords
    files:
      - src/pages/Blogs.jsx
    entry_route: /blogs
    user_interactions:
      - Enter search query in the search bar
      - Click on category filter pills (e.g., Wellness, Research)
      - View filtered results and navigate to a blog post
    auth_required: false
  - name: Dashboard Analytics
    description: Visualization of health and performance metrics across different roles
    files:
      - src/patient/pages/PatientDashboard.jsx
      - src/medical/pages/MedicalDashboard.jsx
      - src/clinic/pages/ClinicDashboard.jsx
    entry_route: /patient/dashboard
    user_interactions:
      - View donut charts and stats cards
      - Observe skeleton loading states during initial load
    auth_required: true
known_limitations: []
